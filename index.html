<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurial Personality Profile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a1a; min-height: 100vh; }

  .header { background: #2d2654; color: white; padding: 2rem; text-align: center; }
  .header h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.3rem; }
  .header p { font-size: 0.9rem; opacity: 0.75; }
  .progress-bar-wrap { background: rgba(255,255,255,0.2); height: 6px; border-radius: 3px; margin-top: 1rem; }
  .progress-bar { background: #7c6fef; height: 6px; border-radius: 3px; transition: width 0.4s; }

  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }

  .section-header { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 0.5px solid #e0ddd5; }
  .section-header h2 { font-size: 1.1rem; font-weight: 600; color: #2d2654; margin-bottom: 0.3rem; }
  .section-header p { font-size: 0.85rem; color: #666; line-height: 1.5; }

  .item-card { background: white; border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; border: 0.5px solid #e0ddd5; }
  .item-text { font-size: 0.95rem; line-height: 1.5; margin-bottom: 1rem; color: #222; }
  .item-num { display: inline-block; background: #f0eeff; color: #5347c0; border-radius: 50%; width: 24px; height: 24px; text-align: center; line-height: 24px; font-size: 0.8rem; font-weight: 600; margin-right: 8px; }

  .scale-wrap { display: flex; flex-direction: column; gap: 6px; }
  .scale-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: #999; padding: 0 2px; }
  .scale-btns { display: flex; gap: 4px; }
  .scale-btn {
    flex: 1; padding: 8px 4px; border: 1.5px solid #e0ddd5; border-radius: 8px;
    background: white; cursor: pointer; font-size: 0.85rem; font-weight: 500;
    color: #555; transition: all 0.15s; text-align: center;
  }
  .scale-btn:hover { border-color: #7c6fef; color: #5347c0; }
  .scale-btn.selected { background: #2d2654; border-color: #2d2654; color: white; }

  .nav-btns { display: flex; gap: 12px; margin-top: 2rem; justify-content: flex-end; }
  .btn { padding: 0.75rem 2rem; border-radius: 8px; border: none; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #2d2654; color: white; }
  .btn-primary:hover { background: #3d3570; }
  .btn-secondary { background: white; color: #555; border: 1.5px solid #ddd; }
  .btn-secondary:hover { background: #f5f5f5; }

  .name-input-wrap { background: white; border-radius: 12px; padding: 2rem; border: 0.5px solid #e0ddd5; text-align: center; margin-bottom: 1.5rem; }
  .name-input-wrap h2 { font-size: 1.2rem; font-weight: 600; color: #2d2654; margin-bottom: 0.5rem; }
  .name-input-wrap p { font-size: 0.85rem; color: #888; margin-bottom: 1.2rem; line-height: 1.5; }
  .name-input { width: 100%; max-width: 360px; padding: 0.75rem 1rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
  .name-input:focus { border-color: #7c6fef; }

  .result-wrap { max-width: 720px; margin: 0 auto; padding: 1rem; }
  .result-header { text-align: center; background: #2d2654; color: white; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; }
  .result-header h2 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .result-header p { opacity: 0.7; font-size: 0.85rem; }

  .dimension-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 0.5px solid #e0ddd5; }
  .dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .dim-name { font-size: 1rem; font-weight: 600; color: #2d2654; }
  .dim-score { font-size: 1.1rem; font-weight: 700; color: #5347c0; }
  .dim-bar-bg { background: #f0eeff; border-radius: 6px; height: 10px; }
  .dim-bar { background: linear-gradient(90deg, #5347c0, #7c6fef); border-radius: 6px; height: 10px; }
  .dim-label { font-size: 0.8rem; color: #888; margin-top: 0.5rem; }
  .subdim-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .subdim-name { font-size: 0.82rem; color: #666; min-width: 140px; }
  .subdim-bar-bg { flex: 1; background: #f5f5f5; border-radius: 4px; height: 6px; margin: 0 10px; }
  .subdim-bar { background: #aaa5e0; border-radius: 4px; height: 6px; }
  .subdim-score { font-size: 0.82rem; color: #888; min-width: 28px; text-align: right; }

  .chart-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 0.5px solid #e0ddd5; }
  .chart-card h3 { font-size: 0.95rem; font-weight: 600; color: #2d2654; margin-bottom: 1rem; }

  .download-btn { width: 100%; padding: 1rem; background: #2d2654; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
  .download-btn:hover { background: #3d3570; }

  .error-msg { background: #fff3f3; border: 1px solid #fcc; color: #c00; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; margin-top: 1rem; display: none; }

  @media print {
    .download-btn { display: none; }
    .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .result-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .dim-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  @media (max-width: 480px) {
    .scale-btn { padding: 6px 2px; font-size: 0.8rem; }
    .subdim-name { min-width: 100px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Entrepreneurial Personality Profile</h1>
  <p>MBA Course — Psychology in Entrepreneurship</p>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<div id="app"></div>

<script>
const SECTIONS = [
  {
    id: 'psycap',
    title: 'Psychological Capital',
    description: 'The following statements describe attitudes and feelings about yourself and your work. Rate your agreement on a scale from 1 (strongly disagree) to 6 (strongly agree).',
    scale: 6,
    scaleLabels: ['1 — Strongly disagree', '6 — Strongly agree'],
    dimensions: [
      { id: 'efficacy', name: 'Self-Efficacy', items: [
        { id: 'se1', text: 'I feel confident analyzing a long-term problem to find a solution.' },
        { id: 'se2', text: 'I feel confident in representing my work area in meetings with management.' },
        { id: 'se3', text: 'I feel confident contributing to discussions about the company\'s strategy.' },
      ]},
      { id: 'hope', name: 'Hope', items: [
        { id: 'ho1', text: 'If I should find myself in a jam at work, I could think of many ways to get out of it.' },
        { id: 'ho2', text: 'Right now I see myself as being pretty successful at work.' },
        { id: 'ho3', text: 'I can think of many ways to reach my current work goals.' },
      ]},
      { id: 'resilience', name: 'Resilience', items: [
        { id: 're1', text: 'I am usually able to handle difficulties at work one way or another.' },
        { id: 're2', text: 'I can get through difficult times at work because I\'ve experienced difficulty before.' },
        { id: 're3', text: 'When things are uncertain for me at work, I usually expect the best.' },
      ]},
      { id: 'optimism', name: 'Optimism', items: [
        { id: 'op1', text: 'I always look on the bright side of things regarding my job.' },
        { id: 'op2', text: 'I\'m optimistic about what will happen in the future as it pertains to my work.' },
        { id: 'op3', text: 'In this job, things never work out the way I want them to.', reverse: true },
      ]},
    ]
  },
  {
    id: 'risk',
    title: 'Risk Propensity',
    description: 'The following statements describe how you approach risk in entrepreneurial and business contexts. Rate your agreement on a scale from 1 (strongly disagree) to 7 (strongly agree).',
    scale: 7,
    scaleLabels: ['1 — Strongly disagree', '7 — Strongly agree'],
    dimensions: [
      { id: 'risk', name: 'Risk Propensity', items: [
        { id: 'rp1', text: 'I am generally willing to take risks when starting a new business venture.' },
        { id: 'rp2', text: 'Taking risks is an essential part of entrepreneurship.' },
        { id: 'rp3', text: 'I would invest in a promising business idea even if the outcome is uncertain.' },
        { id: 'rp4', text: 'I prefer to avoid situations where the outcome is unpredictable.', reverse: true },
        { id: 'rp5', text: 'When evaluating a business opportunity, I focus more on the potential gains than potential losses.' },
        { id: 'rp6', text: 'I am comfortable making decisions with incomplete information when the potential upside is high.' },
      ]}
    ]
  },
  {
    id: 'sea',
    title: 'Scientific Entrepreneurial Action',
    description: 'Please indicate your level of agreement with the statements below (1 = strongly disagree, 7 = strongly agree).',
    scale: 7,
    scaleLabels: ['1 — Strongly disagree', '7 — Strongly agree'],
    dimensions: [
      { id: 'sea_identify', name: 'Theory', items: [
        { id: 'si1', text: 'I need to have a thorough understanding of the problems customers face.' },
        { id: 'si2', text: 'I analyze the problems customers face and propose solutions consistent with these problems.' },
        { id: 'si3', text: 'When developing a business idea, I specify the core assumptions underlying that idea.' },
      ]},
      { id: 'sea_test', name: 'Testing', items: [
        { id: 'st1', text: 'There is a need to test my business idea in the market.' },
        { id: 'st2', text: 'By testing my business idea, I learn more about its actual value.' },
        { id: 'st3', text: 'Testing the core assumptions underlying my business idea is critical for success.' },
        { id: 'st4', text: 'When testing my business idea, I have to test the hypotheses underlying the idea.' },
      ]},
      { id: 'sea_update', name: 'Updating', items: [
        { id: 'su1', text: 'I am open to updating my initial business idea based on new information.' },
        { id: 'su2', text: 'I update my business idea based on the feedback received.' },
        { id: 'su3', text: 'I update my business idea with the goal to improve its product-market fit.' },
        { id: 'su4', text: 'In updating my business idea, I try to balance my own convictions about the idea with feedback received from others.' },
      ]},
    ]
  }
];

let state = {
  screen: 'name',
  name: '',
  currentSection: 0,
  answers: {},
  sectionPage: 0,
};

const ITEMS_PER_PAGE = 6;

function getAllItems(section) {
  return section.dimensions.flatMap(d => d.items);
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'name') renderName(app);
  else if (state.screen === 'survey') renderSurvey(app);
  else if (state.screen === 'results') renderResults(app);
}

function renderName(app) {
  updateProgress(0);
  app.innerHTML = `
    <div class="container">
      <div class="name-input-wrap">
        <h2>Welcome to your Entrepreneurial Personality Profile</h2>
        <p>This survey takes approximately 10 minutes to complete.<br>Please enter your name to begin.</p>
        <input class="name-input" type="text" id="nameInput" placeholder="Your full name" value="${state.name}" />
        <div class="error-msg" id="nameErr">Please enter your name to continue.</div>
      </div>
      <div class="nav-btns">
        <button class="btn btn-primary" onclick="startSurvey()">Begin Survey →</button>
      </div>
    </div>`;
}

function startSurvey() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) { document.getElementById('nameErr').style.display = 'block'; return; }
  state.name = val;
  state.screen = 'survey';
  state.currentSection = 0;
  state.sectionPage = 0;
  render();
}

function renderSurvey(app) {
  const sec = SECTIONS[state.currentSection];
  const allItems = getAllItems(sec);
  const totalPages = Math.ceil(allItems.length / ITEMS_PER_PAGE);
  const pageItems = allItems.slice(state.sectionPage * ITEMS_PER_PAGE, (state.sectionPage + 1) * ITEMS_PER_PAGE);

  const totalItems = SECTIONS.flatMap(s => getAllItems(s)).length;
  const answeredItems = Object.keys(state.answers).length;
  const progress = Math.round((answeredItems / totalItems) * 90);
  updateProgress(progress);

  let html = `<div class="container">
    <div class="section-header">
      <h2>${sec.title} <span style="font-weight:400;color:#999;font-size:0.85rem;">(${state.currentSection + 1} of ${SECTIONS.length})</span></h2>
      <p>${sec.description}</p>
    </div>`;

  pageItems.forEach(item => {
    const answered = state.answers[item.id];
    html += `<div class="item-card">
      <div class="item-text"><span class="item-num">${allItems.indexOf(item)+1}</span>${item.text}</div>
      <div class="scale-wrap">
        <div class="scale-labels"><span>${sec.scaleLabels[0]}</span><span>${sec.scaleLabels[1]}</span></div>
        <div class="scale-btns">`;
    for (let v = 1; v <= sec.scale; v++) {
      html += `<button class="scale-btn${answered === v ? ' selected' : ''}" onclick="answer('${item.id}', ${v})">${v}</button>`;
    }
    html += `</div></div></div>`;
  });

  const isLastPage = state.sectionPage >= totalPages - 1;
  const isLastSection = state.currentSection >= SECTIONS.length - 1;

  html += `<div class="error-msg" id="surveyErr">Please answer all questions before continuing.</div>
    <div class="nav-btns">
      ${(state.sectionPage > 0 || state.currentSection > 0) ? '<button class="btn btn-secondary" onclick="prevPage()">← Back</button>' : ''}
      <button class="btn btn-primary" onclick="nextPage()">${isLastPage && isLastSection ? 'See My Results →' : 'Continue →'}</button>
    </div>
  </div>`;

  app.innerHTML = html;
}

function answer(id, val) {
  state.answers[id] = val;
  render();
}

function nextPage() {
  const sec = SECTIONS[state.currentSection];
  const allItems = getAllItems(sec);
  const totalPages = Math.ceil(allItems.length / ITEMS_PER_PAGE);
  const pageItems = allItems.slice(state.sectionPage * ITEMS_PER_PAGE, (state.sectionPage + 1) * ITEMS_PER_PAGE);
  if (!pageItems.every(i => state.answers[i.id] !== undefined)) {
    document.getElementById('surveyErr').style.display = 'block';
    return;
  }
  if (state.sectionPage < totalPages - 1) {
    state.sectionPage++;
  } else if (state.currentSection < SECTIONS.length - 1) {
    state.currentSection++;
    state.sectionPage = 0;
  } else {
    state.screen = 'results';
  }
  render();
  window.scrollTo(0, 0);
}

function prevPage() {
  if (state.sectionPage > 0) {
    state.sectionPage--;
  } else if (state.currentSection > 0) {
    state.currentSection--;
    const sec = SECTIONS[state.currentSection];
    const allItems = getAllItems(sec);
    state.sectionPage = Math.ceil(allItems.length / ITEMS_PER_PAGE) - 1;
  }
  render();
  window.scrollTo(0, 0);
}

function scoreSection(sectionId) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  const results = {};
  sec.dimensions.forEach(dim => {
    const scores = dim.items.map(item => {
      const raw = state.answers[item.id] || 0;
      return item.reverse ? (sec.scale + 1 - raw) : raw;
    });
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    results[dim.id] = { name: dim.name, avg: avg, max: sec.scale };
  });
  return results;
}

function pct(val, max) { return Math.round((val / max) * 100); }
function levelLabel(val, max) {
  const p = val / max;
  if (p >= 0.75) return 'High';
  if (p >= 0.5) return 'Moderate';
  return 'Low';
}

function renderResults(app) {
  updateProgress(100);
  const psycap = scoreSection('psycap');
  const risk = scoreSection('risk');
  const sea = scoreSection('sea');

  const psycapOverall = Object.values(psycap).reduce((s, d) => s + d.avg, 0) / Object.values(psycap).length;
  const riskOverall = risk.risk.avg;
  const seaOverall = Object.values(sea).reduce((s, d) => s + d.avg, 0) / Object.values(sea).length;

  app.innerHTML = `<div class="result-wrap">
    <div class="result-header">
      <h2>Your Entrepreneurial Profile</h2>
      <p>${state.name}</p>
    </div>

    <div class="dimension-card">
      <div class="dim-header">
        <span class="dim-name">Psychological Capital (PsyCap)</span>
        <span class="dim-score">${psycapOverall.toFixed(1)} / 6</span>
      </div>
      <div class="dim-bar-bg"><div class="dim-bar" style="width:${pct(psycapOverall,6)}%"></div></div>
      <div class="dim-label">${levelLabel(psycapOverall,6)} overall PsyCap</div>
      ${Object.values(psycap).map(d => `
        <div class="subdim-row">
          <span class="subdim-name">${d.name}</span>
          <div class="subdim-bar-bg"><div class="subdim-bar" style="width:${pct(d.avg,6)}%"></div></div>
          <span class="subdim-score">${d.avg.toFixed(1)}</span>
        </div>`).join('')}
    </div>

    <div class="dimension-card">
      <div class="dim-header">
        <span class="dim-name">Risk Propensity</span>
        <span class="dim-score">${riskOverall.toFixed(1)} / 7</span>
      </div>
      <div class="dim-bar-bg"><div class="dim-bar" style="width:${pct(riskOverall,7)}%"></div></div>
      <div class="dim-label">${levelLabel(riskOverall,7)} risk propensity</div>
    </div>

    <div class="dimension-card">
      <div class="dim-header">
        <span class="dim-name">Scientific Entrepreneurial Action</span>
        <span class="dim-score">${seaOverall.toFixed(1)} / 7</span>
      </div>
      <div class="dim-bar-bg"><div class="dim-bar" style="width:${pct(seaOverall,7)}%"></div></div>
      <div class="dim-label">${levelLabel(seaOverall,7)} overall SEA score</div>
      ${Object.values(sea).map(d => `
        <div class="subdim-row">
          <span class="subdim-name">${d.name}</span>
          <div class="subdim-bar-bg"><div class="subdim-bar" style="width:${pct(d.avg,7)}%"></div></div>
          <span class="subdim-score">${d.avg.toFixed(1)}</span>
        </div>`).join('')}
    </div>

    <div class="chart-card">
      <h3>Profile overview</h3>
      <canvas id="radarChart" height="280"></canvas>
    </div>

    <div class="dimension-card" style="margin-top:1rem;">
      <div class="dim-name" style="margin-bottom:1.25rem;">What your profile means</div>

      <div style="margin-bottom:1.5rem;">
        <div style="font-size:0.9rem;font-weight:600;color:#2d2654;margin-bottom:0.75rem;">Psychological Capital</div>

        <div style="margin-bottom:0.9rem;">
          <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">Self-Efficacy — ${levelLabel(psycap.efficacy.avg,6)} (${psycap.efficacy.avg.toFixed(1)} / 6)</div>
          <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
            psycap.efficacy.avg/6 >= 0.75
              ? 'You have strong confidence in your ability to analyse complex problems and contribute strategically. This is a key driver of entrepreneurial initiative and persistence.'
              : psycap.efficacy.avg/6 >= 0.5
              ? 'You show a reasonable level of self-efficacy. In demanding situations, building further confidence in your analytical and strategic capabilities could help you act more decisively.'
              : 'Your self-efficacy scores suggest you may doubt your capabilities in challenging or high-stakes situations. Deliberate exposure to stretch tasks and small wins can help build this over time.'
          }</p>
        </div>

        <div style="margin-bottom:0.9rem;">
          <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">Hope — ${levelLabel(psycap.hope.avg,6)} (${psycap.hope.avg.toFixed(1)} / 6)</div>
          <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
            psycap.hope.avg/6 >= 0.75
              ? 'You show strong goal-directed thinking and the ability to find alternative pathways when obstacles arise — a hallmark of entrepreneurial agency.'
              : psycap.hope.avg/6 >= 0.5
              ? 'You have a moderate sense of hope. You generally stay focused on goals, though you might benefit from developing more flexible contingency thinking when plans go off track.'
              : 'Lower hope scores can indicate difficulty maintaining motivation or finding alternative routes to goals under pressure. Working on goal-setting structures and "if-then" planning may help.'
          }</p>
        </div>

        <div style="margin-bottom:0.9rem;">
          <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">Resilience — ${levelLabel(psycap.resilience.avg,6)} (${psycap.resilience.avg.toFixed(1)} / 6)</div>
          <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
            psycap.resilience.avg/6 >= 0.75
              ? 'You are highly resilient — able to bounce back from setbacks and draw on past experience to navigate adversity. This is especially valuable in the volatile context of entrepreneurship.'
              : psycap.resilience.avg/6 >= 0.5
              ? 'You show moderate resilience. You cope reasonably well with difficulties, though high-pressure or novel setbacks may take more out of you than expected.'
              : 'Resilience is an area where you may have room to grow. Building reflective habits around how you have overcome challenges in the past can help strengthen this capacity.'
          }</p>
        </div>

        <div>
          <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">Optimism — ${levelLabel(psycap.optimism.avg,6)} (${psycap.optimism.avg.toFixed(1)} / 6)</div>
          <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
            psycap.optimism.avg/6 >= 0.75
              ? 'You hold a positive and forward-looking outlook. Entrepreneurial optimism helps sustain motivation through uncertainty — as long as it is paired with realistic risk assessment.'
              : psycap.optimism.avg/6 >= 0.5
              ? 'Your optimism is moderate. You can see the upside in your work, though you may occasionally be held back by doubt about future outcomes.'
              : 'Lower optimism may make it harder to sustain momentum in the face of setbacks. Cognitive reframing techniques and tracking small progress can help shift this orientation over time.'
          }</p>
        </div>
      </div>

      <div style="border-top:0.5px solid #e0ddd5;padding-top:1.25rem;margin-bottom:1.5rem;">
        <div style="font-size:0.9rem;font-weight:600;color:#2d2654;margin-bottom:0.75rem;">Risk Propensity</div>
        <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">${levelLabel(riskOverall,7)} (${riskOverall.toFixed(1)} / 7)</div>
        <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
          riskOverall/7 >= 0.75
            ? 'You have a high tolerance for uncertainty and are comfortable acting under ambiguous conditions. This can be a major asset in early-stage ventures, though it is worth reflecting on whether your risk appetite is always paired with structured evaluation of downside scenarios.'
            : riskOverall/7 >= 0.5
            ? 'You show a balanced approach to risk — willing to act under uncertainty, but not recklessly so. This is often associated with calculated entrepreneurial decision-making, where opportunities are pursued with awareness of potential downsides.'
            : 'You tend to be cautious in uncertain situations. While this can protect against poor decisions, entrepreneurship often requires acting before all information is available. Developing comfort with managed uncertainty may be a useful area to explore.'
        }</p>
      </div>

      <div style="border-top:0.5px solid #e0ddd5;padding-top:1.25rem;">
        <div style="font-size:0.9rem;font-weight:600;color:#2d2654;margin-bottom:0.75rem;">Scientific Entrepreneurial Action</div>

        <div style="margin-bottom:0.9rem;">
          <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">Theory — ${levelLabel(sea.sea_identify.avg,7)} (${sea.sea_identify.avg.toFixed(1)} / 7)</div>
          <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
            sea.sea_identify.avg/7 >= 0.75
              ? 'You place strong emphasis on deeply understanding customer problems before developing solutions. This customer-first, assumption-aware mindset is the foundation of effective scientific entrepreneurship.'
              : sea.sea_identify.avg/7 >= 0.5
              ? 'You have a moderate orientation toward problem understanding. You recognise the importance of customer insight, though you may sometimes move toward solutions before fully mapping the underlying problem.'
              : 'You may benefit from slowing down before building — investing more time in articulating the customer problem and the assumptions your idea rests on before pursuing a solution.'
          }</p>
        </div>

        <div style="margin-bottom:0.9rem;">
          <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">Testing — ${levelLabel(sea.sea_test.avg,7)} (${sea.sea_test.avg.toFixed(1)} / 7)</div>
          <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
            sea.sea_test.avg/7 >= 0.75
              ? 'You strongly believe in market testing and hypothesis validation. You treat your business idea as a set of assumptions to be tested rather than truths to be defended — a core principle of scientific entrepreneurship.'
              : sea.sea_test.avg/7 >= 0.5
              ? 'You see value in testing, but may not always approach it in a fully structured or hypothesis-driven way. Becoming more explicit about what you are testing and what would constitute a result could sharpen this.'
              : 'Testing is an area to develop. Entrepreneurs who delay or avoid market validation often invest in solutions that don\'t fit the market. Starting with small, low-cost experiments can build this habit.'
          }</p>
        </div>

        <div>
          <div style="font-size:0.82rem;font-weight:600;color:#5347c0;margin-bottom:0.25rem;">Updating — ${levelLabel(sea.sea_update.avg,7)} (${sea.sea_update.avg.toFixed(1)} / 7)</div>
          <p style="font-size:0.83rem;color:#444;line-height:1.6;">${
            sea.sea_update.avg/7 >= 0.75
              ? 'You are highly open to revising your idea based on evidence and feedback. This adaptability — balanced with your own conviction — is strongly associated with achieving product-market fit.'
              : sea.sea_update.avg/7 >= 0.5
              ? 'You show a reasonable willingness to update your idea, though you may sometimes struggle to balance incoming feedback with your own convictions about the opportunity.'
              : 'A lower updating score may indicate a tendency to stick with your original idea even when evidence suggests otherwise. Practising structured reflection after feedback sessions can help develop this flexibility.'
          }</p>
        </div>
      </div>
    </div>

    <button class="download-btn" onclick="window.print()">Download / Print My Profile</button>
    <p style="text-align:center;font-size:0.75rem;color:#aaa;margin-top:1rem;padding-bottom:2rem;">Thank you for completing the survey, ${state.name}.</p>
  </div>`;

  setTimeout(() => {
    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['Self-Efficacy', 'Hope', 'Resilience', 'Optimism', 'Risk Propensity', 'Theory', 'Testing', 'Updating'],
        datasets: [{
          label: state.name,
          data: [
            pct(psycap.efficacy.avg, 6),
            pct(psycap.hope.avg, 6),
            pct(psycap.resilience.avg, 6),
            pct(psycap.optimism.avg, 6),
            pct(riskOverall, 7),
            pct(sea.sea_identify.avg, 7),
            pct(sea.sea_test.avg, 7),
            pct(sea.sea_update.avg, 7),
          ],
          backgroundColor: 'rgba(83,71,192,0.15)',
          borderColor: '#5347c0',
          pointBackgroundColor: '#5347c0',
          pointRadius: 4,
        }]
      },
      options: {
        scales: {
          r: {
            min: 0, max: 100,
            ticks: { stepSize: 25, display: false },
            grid: { color: '#eee' },
            pointLabels: { font: { size: 11 } }
          }
        },
        plugins: { legend: { display: false } }
      }
    });

    submitToSheets({
      name: state.name,
      psycap_overall: psycapOverall.toFixed(2),
      efficacy: psycap.efficacy.avg.toFixed(2),
      hope: psycap.hope.avg.toFixed(2),
      resilience: psycap.resilience.avg.toFixed(2),
      optimism: psycap.optimism.avg.toFixed(2),
      risk: riskOverall.toFixed(2),
      sea_overall: seaOverall.toFixed(2),
      theory: sea.sea_identify.avg.toFixed(2),
      testing: sea.sea_test.avg.toFixed(2),
      updating: sea.sea_update.avg.toFixed(2)
    });
  }, 150);
}

function submitToSheets(data) {
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwM2R6E2TQGM_lL8ZpHPAfD7iaendF6O4pDfk6hbYN_7PjeFA5u9HB6ZXr6mnwjzPV4/exec';
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).catch(err => console.warn('Sheet submission failed:', err));
}

function updateProgress(p) {
  const bar = document.getElementById('progressBar');
  if (bar) bar.style.width = p + '%';
}

render();
</script>
</body>
</html>
